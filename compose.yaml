services:
  cap-mmi:
    build:
      context: .
      dockerfile: Dockerfile
    image: cap-mmi:local
    init: true
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Définissez ADMIN_PASSWORD dans .env}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?Définissez ADMIN_SESSION_SECRET dans .env}
      APP_DATA_DIR: /app/data
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
    volumes:
      - cap_mmi_data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  cap_mmi_data:
    name: cap_mmi_data
